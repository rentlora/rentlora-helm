{{- if .Values.hostname }}
---
# ── ArgoCD Route ──────────────────────────────────────────────────────────────
# Only deployed in prod (when hostname is set) — requires ReferenceGrants.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: rentlora-gateway
  hostnames:
    - "argocd.rentlora.in"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 80

---
# ── Grafana Route ─────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: rentlora-gateway
  hostnames:
    - "grafana.rentlora.in"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          namespace: monitoring
          port: 80

---
# ── Headlamp Route ────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: rentlora-gateway
  hostnames:
    - "headlamp.rentlora.in"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: my-headlamp
          namespace: kube-system
          port: 80
{{- end }}
