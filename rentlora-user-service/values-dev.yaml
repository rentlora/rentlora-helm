# ── Dev overrides ─────────────────────────────────────────────────────────────
# image.tag is set dynamically by CI/CD:  sha-<7-char-sha>
image:
  tag: "sha-be2480e"
service:
  type: ClusterIP
replicaCount: 1
config:
  mongoHost: "mongodb.rentlora-dev.svc.cluster.local"
  mongoDbName: "rentlora_dev"
  logLevel: "DEBUG"
hpa:
  enabled: false # No HPA in dev to save resources
networkPolicy:
  enabled: true
