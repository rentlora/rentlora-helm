# ── Dev overrides ─────────────────────────────────────────────────────────────
# image.tag is set dynamically by CI/CD:  sha-<7-char-sha>
image:
  tag: "sha-latest"

replicaCount: 1

config:
  mongoHost: "mongodb.dev.svc.cluster.local"
  mongoDbName: "rentlora_dev"
  logLevel: "DEBUG"

hpa:
  enabled: false    # No HPA in dev to save resources
