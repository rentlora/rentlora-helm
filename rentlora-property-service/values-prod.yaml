image:
  tag: "v1.0.0"
replicaCount: 2
config:
  mongoHost: "mongodb.prod.svc.cluster.local"
  mongoDbName: "rentlora_prod"
  logLevel: "INFO"
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
