apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  MONGO_HOST: {{ .Values.config.mongoHost | quote }}
  MONGO_PORT: {{ .Values.config.mongoPort | quote }}
  MONGO_DB_NAME: {{ .Values.config.mongoDbName | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
