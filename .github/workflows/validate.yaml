name: Helm Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  helm-validate:
    name: Helm lint/template
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - cluster-infra
          - kgateway
          - mongodb
          - rentlora-user-service
          - rentlora-property-service
          - rentlora-booking-service
          - rentlora-payment-service
          - rentlora-ai-service
          - rentlora-ui

    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Lint base chart
        run: helm lint "${{ matrix.chart }}"

      - name: Validate dev render
        run: |
          if [ -f "${{ matrix.chart }}/values-dev.yaml" ]; then
            helm template "${{ matrix.chart }}-dev" "${{ matrix.chart }}" \
              -f "${{ matrix.chart }}/values.yaml" \
              -f "${{ matrix.chart }}/values-dev.yaml" \
              | kubeconform -strict -summary -ignore-missing-schemas
          else
            helm template "${{ matrix.chart }}-dev" "${{ matrix.chart }}" \
              | kubeconform -strict -summary -ignore-missing-schemas
          fi

      - name: Validate prod render
        run: |
          if [ -f "${{ matrix.chart }}/values-prod.yaml" ]; then
            helm template "${{ matrix.chart }}-prod" "${{ matrix.chart }}" \
              -f "${{ matrix.chart }}/values.yaml" \
              -f "${{ matrix.chart }}/values-prod.yaml" \
              | kubeconform -strict -summary -ignore-missing-schemas
          else
            helm template "${{ matrix.chart }}-prod" "${{ matrix.chart }}" \
              | kubeconform -strict -summary -ignore-missing-schemas
          fi

  argocd-validate:
    name: Argo CD manifest validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate Argo CD manifests
        run: |
          find argocd -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 \
            | xargs -0 cat \
            | kubeconform -strict -summary -ignore-missing-schemas

  security:
    name: Helm repo security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy config SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Fail on critical config findings
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL
          exit-code: 1
