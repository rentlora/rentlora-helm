apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
type: Opaque
data:
  # Injected by CI/CD via: helm upgrade --set secrets.geminiApiKey=<value>
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | b64enc | quote }}
