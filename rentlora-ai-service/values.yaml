replicaCount: 1
image:
  repository: ghcr.io/rentlora/rentlora-ai-service
  tag: "latest"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8005
resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
probes:
  liveness:
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
hpa:
  enabled: false    # AI service is stateless but expensive; scale manually
config:
  logLevel: "INFO"
# Secret: GEMINI_API_KEY â€” injected by CI/CD via helm --set
secrets:
  geminiApiKey: ""



imagePullSecrets:
  - name: ghcr-secret
