apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rentlora-cluster-infra-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rentlora/rentlora-helm.git
    targetRevision: HEAD
    path: cluster-infra
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
