apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-rentlora-property-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rentlora/rentlora-helm.git
    targetRevision: HEAD
    path: rentlora-property-service
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: rentlora-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
