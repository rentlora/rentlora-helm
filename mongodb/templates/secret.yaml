apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
type: Opaque
data:
  # Injected by CI/CD via: helm upgrade --set secrets.mongoRootUsername=<value>
  MONGO_ROOT_USERNAME: {{ .Values.secrets.mongoRootUsername | b64enc | quote }}
  MONGO_ROOT_PASSWORD: {{ .Values.secrets.mongoRootPassword | b64enc | quote }}
