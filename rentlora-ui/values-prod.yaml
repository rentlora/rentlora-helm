# image.tag is managed by the CI/CD pipeline via GitOps.
# The pipeline runs: yq e '.image.tag = "v<semver>"' -i helm/<service>/values-prod.yaml
# then commits and pushes the file. ArgoCD detects the Git change and syncs.
# Never edit this value manually.
image:
  tag: "sha-2b4f4fd"

replicaCount: 1
hpa:
  enabled: false
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
