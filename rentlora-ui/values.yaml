replicaCount: 1

image:
  repository: ghcr.io/rentlora/rentlora-ui
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 20
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

# UI is a static nginx container â€” it does NOT need API URLs in its Helm config.
# All API traffic is routed through KGateway via path-based routing.
# The UI build-time env vars (VITE_*) are baked in during the Docker build via
# the CI/CD pipeline using --build-arg, NOT via Kubernetes config.


imagePullSecrets:
  - name: ghcr-secret
