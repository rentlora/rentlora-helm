{{- if eq .Values.environment "prod" }}
# ── ArgoCD Route ──────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rentlora-gateway
      namespace: rentlora-{{ .Values.environment }}
  hostnames:
    - "argocd.rentlora.in"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1

---
# ── Grafana ───────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rentlora-gateway
      namespace: rentlora-{{ .Values.environment }}
  hostnames:
    - "grafana.rentlora.in"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: prometheus-grafana
          port: 80
          weight: 1

---
# ── Headlamp Route ────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp-route
  namespace: kube-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: rentlora-gateway
      namespace: rentlora-{{ .Values.environment }}
  hostnames:
    - "headlamp.rentlora.in"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: my-headlamp
          port: 80
          weight: 1
{{- end }}
