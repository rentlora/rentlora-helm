apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rentlora-prod-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rentlora/rentlora-helm.git
    targetRevision: HEAD
    path: argocd/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
