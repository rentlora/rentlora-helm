loki:
  loki:   
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    compactor:
      working_directory: /var/loki/compactor

    limits_config:
      retention_period: 168h

    storage:
      type: s3
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin

  global:
    storageClass: nfs-prod

  structuredConfig:
    pattern_ingester:
      enabled: true
    limits_config:
      retention_period: 168h
      volume_enabled: true
      allow_structured_metadata: true
      discover_service_name:
        - service_name
        - service
        - app
        - app_kubernetes_io_name
        - container

  backend:
    replicas: 1
    persistence:
      volumeClaimsEnabled: true
      storageClass: nfs-prod
      size: 10Gi

  write:
    replicas: 1
    persistence:
      volumeClaimsEnabled: true
      storageClass: nfs-prod
      size: 10Gi

  read:
    replicas: 1
    persistence:
      volumeClaimsEnabled: true
      storageClass: nfs-prod
      size: 10Gi

  singleBinary:
    replicas: 0

  gateway:
    enabled: true
    service:
      type: ClusterIP
      port: 80

  minio:
    enabled: true
    persistence:
      size: 10Gi
      storageClass: nfs-prod

  lokiCanary:
    enabled: false

  test:
    enabled: false

  monitoring:
    dashboards:
      enabled: false
    rules:
      enabled: false
    serviceMonitor:
      enabled: false
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
